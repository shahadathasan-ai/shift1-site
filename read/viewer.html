<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reader — Shift1 Productions</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0b0b0b;
      --text: #e8e4de;
      --text-muted: #8a8580;
      --accent: #c9b99a;
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── PARTICLES ─── */
    .particles {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .particle {
      position: absolute; background: var(--accent);
      border-radius: 50%; opacity: 0;
      animation: firefly ease-in-out infinite;
    }
    @keyframes firefly {
      0% { opacity: 0; transform: translate(0, 0); }
      25% { opacity: 0.25; }
      50% { opacity: 0.08; transform: translate(30px, -60px); }
      75% { opacity: 0.2; }
      100% { opacity: 0; transform: translate(-20px, -120px); }
    }

    /* ─── LAYOUT ─── */
    .reader-layout {
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* ─── TOP BAR ─── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 3rem;
      flex-shrink: 0;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-logo {
      font-family: var(--font-heading);
      font-size: 1rem; font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--text); text-decoration: none;
    }

    .back-link {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link::before { content: '\2190  '; }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .constraint-pill {
      font-size: 0.6rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 3px;
      padding: 0.25rem 0.6rem;
      letter-spacing: 0.03em;
    }

    .constraint-pill strong {
      color: var(--text);
      font-weight: 400;
    }

    /* ─── PAGE AREA ─── */
    .page-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3rem 1rem;
      gap: 1.5rem;
      min-height: 0;
    }

    .page-nav {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 3rem;
      cursor: pointer;
      padding: 1rem 1rem;
      transition: color 0.3s;
      user-select: none;
      flex-shrink: 0;
    }
    .page-nav:hover { color: var(--accent); }
    .page-nav:disabled { opacity: 0.15; cursor: default; }
    .page-nav:disabled:hover { color: var(--text-muted); }

    .page-container {
      max-width: 680px;
      max-height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .page-container canvas {
      display: block;
      transition: opacity 0.3s ease;
      background: #fff;
      border-radius: 3px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.5);
    }

    /* ─── LOADING ─── */
    .loading {
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    /* ─── BOTTOM BAR ─── */
    .bottom-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0.6rem 3rem;
      flex-shrink: 0;
    }

    .page-counter {
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      opacity: 0.6;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .top-bar { padding: 0.8rem 1rem; flex-wrap: wrap; gap: 0.5rem; }
      .top-bar-right { display: none; }
      .page-area { padding: 0 0.5rem 0.5rem; gap: 0.5rem; }
      .page-container { max-height: calc(100vh - 100px); }
      .page-nav { font-size: 2rem; padding: 0.5rem 0.5rem; }
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="reader-layout">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="top-bar-left">
        <a href="../index.html" class="nav-logo">SH1FT</a>
        <a href="../nyc-midnight.html" class="back-link">NYC Midnight</a>
      </div>
      <div class="top-bar-right" id="pillsContainer"></div>
    </div>

    <!-- PAGE AREA -->
    <div class="page-area">
      <button class="page-nav" id="prevBtn" onclick="changePage(-1)">&#8249;</button>

      <div class="page-container" id="pageContainer">
        <div class="loading" id="loadingMsg">Loading...</div>
        <canvas id="pdfCanvas" style="opacity: 0;"></canvas>
      </div>

      <button class="page-nav" id="nextBtn" onclick="changePage(1)">&#8250;</button>
    </div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
      <div class="page-counter" id="pageCounter"></div>
    </div>

  </div>

  <script>
    // ─── STORY CONFIG ───
    const stories = {
      'dont-answer': {
        pdf: 'pdfs/dont-answer.pdf',
        title: 'Don\u2019t Answer.',
        pills: [
          { key: 'Scare', val: 'A Silhouette' },
          { key: 'Action', val: 'Concealing' },
          { key: 'Character', val: 'A Stepsister' }
        ]
      },
      'oops': {
        pdf: 'pdfs/oops.pdf',
        title: 'Oops',
        pills: [
          { key: 'Scare', val: 'New Year\u2019s Eve' },
          { key: 'Action', val: 'Roughhousing' },
          { key: 'Character', val: 'A Klutz' }
        ]
      },
      'confession-114': {
        pdf: 'pdfs/confession-114.pdf',
        title: 'Confession 114',
        pills: [
          { key: 'Scare', val: 'A Wrong Turn' },
          { key: 'Action', val: 'Sifting' },
          { key: 'Character', val: 'An Exhausted Person' }
        ]
      },
      'feed': {
        pdf: 'pdfs/feed.pdf',
        title: 'Feed',
        pills: [
          { key: 'Genre', val: 'Horror' },
          { key: 'Subject', val: 'Turn of the Century' },
          { key: 'Character', val: 'A Doppelg\u00e4nger' }
        ]
      },
      'first-words': {
        pdf: 'pdfs/first-words.pdf',
        title: 'First Words',
        pills: [
          { key: 'Genre', val: 'Sci-Fi' },
          { key: 'Action', val: 'Publicity Stunt' },
          { key: 'Character', val: 'A Coach' }
        ]
      },
      'eau-de-prince': {
        pdf: 'pdfs/eau-de-prince.pdf',
        title: 'Eau de Prince',
        pills: [
          { key: 'Genre', val: 'Romantic Comedy' },
          { key: 'Subject', val: 'Contamination' },
          { key: 'Character', val: 'A Prince' }
        ]
      }
    };

    // ─── PARTICLES ───
    const pc = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.classList.add('particle');
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      const s = 2 + Math.random() * 2;
      p.style.width = s + 'px';
      p.style.height = s + 'px';
      p.style.animationDuration = (8 + Math.random() * 8) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      pc.appendChild(p);
    }

    // ─── RESOLVE STORY FROM HASH ───
    const storyId = location.hash.slice(1);
    const story = stories[storyId];

    if (!story) {
      location.href = '../nyc-midnight.html';
      throw new Error('Unknown story');
    }

    // Set title
    document.title = story.title + ' \u2014 Shift1 Productions';

    // Render constraint pills
    const pillsContainer = document.getElementById('pillsContainer');
    story.pills.forEach(pill => {
      const span = document.createElement('span');
      span.className = 'constraint-pill';
      span.innerHTML = '<strong>' + pill.key + ':</strong>&nbsp; ' + pill.val;
      pillsContainer.appendChild(span);
    });

    // ─── PDF.js SETUP ───
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('pageContainer');
    const counter = document.getElementById('pageCounter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const loadingMsg = document.getElementById('loadingMsg');

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let rendering = false;

    async function renderPage(num) {
      if (rendering) return;
      rendering = true;

      const page = await pdfDoc.getPage(num);
      const viewport = page.getViewport({ scale: 1 });

      // Fit page within available viewport space
      const pageArea = document.querySelector('.page-area');
      const availW = Math.min(680, pageArea.clientWidth - 160);
      const availH = pageArea.clientHeight - 20;
      const scaleX = availW / viewport.width;
      const scaleY = availH / viewport.height;
      const scale = Math.min(scaleX, scaleY);

      // Retina support
      const dpr = window.devicePixelRatio || 1;
      const scaledViewport = page.getViewport({ scale: scale * dpr });

      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;
      canvas.style.width = (scaledViewport.width / dpr) + 'px';
      canvas.style.height = (scaledViewport.height / dpr) + 'px';

      await page.render({
        canvasContext: ctx,
        viewport: scaledViewport
      }).promise;

      // Show canvas, hide loading
      canvas.style.opacity = '1';
      loadingMsg.style.display = 'none';

      // Update controls
      counter.textContent = currentPage + ' / ' + totalPages;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;

      rendering = false;
    }

    function changePage(dir) {
      const next = currentPage + dir;
      if (next < 1 || next > totalPages) return;
      currentPage = next;
      renderPage(currentPage);
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changePage(-1);
      if (e.key === 'Escape') location.href = '../nyc-midnight.html';
    });

    // Click outside PDF to go back
    document.addEventListener('click', e => {
      const safe = e.target.closest('.page-container, .page-nav, .top-bar, .bottom-bar');
      if (!safe) location.href = '../nyc-midnight.html';
    });

    // Re-render on resize
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (pdfDoc) renderPage(currentPage);
      }, 150);
    });

    // Load PDF
    async function init() {
      try {
        pdfDoc = await pdfjsLib.getDocument(story.pdf).promise;
        totalPages = pdfDoc.numPages;
        renderPage(1);
      } catch (err) {
        loadingMsg.textContent = 'Failed to load PDF';
        console.error(err);
      }
    }

    init();
  </script>

</body>
</html>
